            const mountRef = useRef(null);
            useEffect(() => {
                if(!mountRef.current) return;
                const canvas = document.createElement('canvas');
                canvas.style.position = 'fixed';
                canvas.style.top = '0';
                canvas.style.left = '0';
                canvas.style.width = '100%';
                canvas.style.height = '100%';
                canvas.style.zIndex = '-1';
                canvas.style.pointerEvents = 'none';
                mountRef.current.appendChild(canvas);

                const scene = new THREE.Scene();
                const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                const renderer = new THREE.WebGLRenderer({ canvas: canvas, alpha: true, antialias: true });
                renderer.setSize(window.innerWidth, window.innerHeight);
                renderer.setPixelRatio(window.devicePixelRatio);

                const particlesGeometry = new THREE.BufferGeometry();
                const particlesCount = 800;
                const posArray = new Float32Array(particlesCount * 3);
                
                for(let i = 0; i < particlesCount * 3; i++) {
                    posArray[i] = (Math.random() - 0.5) * 20;
                }

                particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
                const material = new THREE.PointsMaterial({ size: 0.02, color: 0x0E7490, transparent: true, opacity: 0.4 });
                const particlesMesh = new THREE.Points(particlesGeometry, material);
                scene.add(particlesMesh);
                camera.position.z = 5;

                const animate = () => {
                    requestAnimationFrame(animate);
                    particlesMesh.rotation.y += 0.0003;
                    particlesMesh.rotation.x += 0.0001;
                    renderer.render(scene, camera);
                };
                animate();

                const handleResize = () => {
                    camera.aspect = window.innerWidth / window.innerHeight;
                    camera.updateProjectionMatrix();
                    renderer.setSize(window.innerWidth, window.innerHeight);
                };
                window.addEventListener('resize', handleResize);
                return () => {
                    window.removeEventListener('resize', handleResize);
                    mountRef.current.removeChild(canvas);
                    particlesGeometry.dispose();
                    material.dispose();
                    renderer.dispose();
                };
            }, []);
            return <div ref={mountRef} />;
        };

        // --- 5. MODALS & SUB-COMPONENTS ---
        
        const InfoModal = ({ data, onClose }) => (
            <div className="fixed inset-0 z-50 flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm animate-fade-in" onClick={onClose}>

                    {/* Header */}
                    <div className="mb-12 animate-slide-up">
                        <div className="section-tag">
                            <i className="fas fa-database"></i> PART 3: DATA NARRATIVE
                        </div>
                        <h1 className="text-5xl md:text-6xl font-extrabold text-slate-900 tracking-tight leading-tight mb-6">
                            Borderless <br/> <span className="text-transparent bg-clip-text bg-gradient-to-r from-primary to-secondary">Dual City</span>

                        <p className="text-slate-600 font-serif text-lg leading-relaxed max-w-3xl bg-white/40 backdrop-blur-sm p-4 rounded-xl border border-white/50">

                                            View {e.events.length} Events <i className="fas fa-arrow-right"></i>
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {selectedItem && <TimelineModal item={selectedItem} onClose={() => setSelectedItem(null)} />}

        const ConclusionSection = () => (

                <div className="animate-slide-up">
                    <div className="inline-flex items-center gap-2 mb-6 text-primary/80 font-mono text-sm font-bold tracking-widest uppercase border-b border-primary/20 pb-2">

                    </div>
                    
                    <h2 className="text-4xl md:text-6xl font-black text-slate-900 mb-8 tracking-tight">
                        The Trilogy of <span className="text-primary">Integration</span>
                    </h2>
                    
                    <p className="text-xl md:text-3xl text-slate-600 font-serif italic mb-16 max-w-4xl mx-auto leading-relaxed">
                        "Our narrative spans three chapters: The <strong className="text-slate-800 not-italic">Hardware Link</strong> built the bridges; The <strong className="text-slate-800 not-italic">Digital Link</strong> forged resilience; and now, The <strong className="text-slate-800 not-italic">Soft Link</strong> dissolves the invisible walls of policy and life."
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 relative">
                        {/* Characteristic 1 */}
                        <div className="group bg-white p-6 rounded-2xl border border-slate-100 shadow-md hover:shadow-xl hover:border-primary/30 transition-all duration-500 flex flex-col items-center hover:-translate-y-2">
                            <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4 group-hover:bg-primary/10 transition-colors">
                                <i className="fas fa-tachometer-alt text-2xl text-slate-400 group-hover:text-primary transition-colors"></i>
                            </div>
                            <h3 className="text-xl font-bold text-slate-800 mb-2">Hardware Connectivity</h3>
                            <p className="text-sm text-slate-500 text-center leading-relaxed">
                                Physical infrastructure has compressed the 1-hour circle into a 14-minute metro-style commute.
                            </p>
                        </div>

                        {/* Characteristic 2 */}
                        <div className="group bg-white p-6 rounded-2xl border border-slate-100 shadow-md hover:shadow-xl hover:border-primary/30 transition-all duration-500 flex flex-col items-center hover:-translate-y-2">
                            <div className="w-16 h-16 bg-slate-50 rounded-full flex items-center justify-center mb-4 group-hover:bg-primary/10 transition-colors">
                                <i className="fas fa-link text-2xl text-slate-400 group-hover:text-primary transition-colors"></i>
                            </div>
                            <h3 className="text-xl font-bold text-slate-800 mb-2">Digital Resilience</h3>
                            <p className="text-sm text-slate-500 text-center leading-relaxed">
                                A unified digital backbone (Health Codes, e-Payments) ensures flow continues despite physical disruptions.
                            </p>
                        </div>

                        {/* Characteristic 3 */}
                        <div className="group bg-gradient-to-br from-primary/5 to-secondary/5 p-6 rounded-2xl border border-primary/20 shadow-lg hover:shadow-2xl hover:border-primary/50 transition-all duration-500 flex flex-col items-center hover:-translate-y-2 relative overflow-hidden">
                            <div className="absolute top-0 right-0 w-20 h-20 bg-primary/10 rounded-full blur-2xl -mr-10 -mt-10"></div>
                            <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mb-4 shadow-sm group-hover:scale-110 transition-transform">
                                <i className="fas fa-infinity text-2xl text-primary animate-pulse-slow"></i>
                            </div>
                            <h3 className="text-xl font-bold text-slate-800 mb-2">Institutional Integration</h3>
                            <p className="text-sm text-slate-600 text-center leading-relaxed font-medium">
                                Policy breakthroughs have granted HK residents 'National Treatment', turning the border into a bridge.
                            </p>
                        </div>
                    </div>

                    {/* Next Chapter Button */}
                    <div className="mt-16 flex justify-center">
                        <a href="index.html?step=4" className="group relative inline-flex items-center gap-3 px-8 py-4 bg-slate-900 text-white rounded-full overflow-hidden shadow-lg hover:shadow-cyan-500/50 transition-all duration-300 hover:scale-105">
                            <div className="absolute inset-0 bg-gradient-to-r from-primary to-secondary opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            <span className="relative font-bold tracking-widest uppercase text-sm z-10">Enter Chapter 3</span>
                            <i className="fas fa-arrow-right relative z-10 group-hover:translate-x-1 transition-transform"></i>
                        </a>
                    </div>
                </div>
            </div>
        );

        // --- 7. ROOT COMPONENT ---

        const App = () => {
            return (
                <div className="w-full min-h-screen relative overflow-hidden">
                    <ParticleBackground />
                    <div className="relative z-10 pb-20">
                        <DashboardSection />
                        <TimelineSection />
                        <ConclusionSection />
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
    <!-- Global Nav & Init Logic -->
    <script src="global-nav.js"></script>
</body>
